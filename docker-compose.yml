version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: notas_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-supersecreta123}
      POSTGRES_DB: ${POSTGRES_DB:-notes_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notas_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-notes_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: notas_api
    restart: always
    ports:
      - "8080:8000"
    environment:
        # Se inyecta la URL de conexión construida dinámicamente. El host es 'db' (nombre del otro contenedor en la misma red)
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-supersecreta123}@db:5432/${POSTGRES_DB:-notes_db}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notas_network

volumes:
  postgres_data:
    name: notas_postgres_volume

networks:
  notas_network:
    name: notas_postgres_network
    driver: bridge
