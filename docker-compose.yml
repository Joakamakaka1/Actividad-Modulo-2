version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: notas_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - notas_network
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: notas_api
    restart: always
    ports:
      - "8080:8000"
    environment:
        # Se inyecta la URL de conexión construida dinámicamente. El host es 'db'
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - notas_network

volumes:
  postgres_data:
    name: notas_postgres_volume

networks:
  notas_network:
    name: notas_postgres_network
    driver: bridge
